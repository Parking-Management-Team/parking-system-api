name: .NET CI

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test --no-build --configuration Release --verbosity normal

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Check Code Formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic

    - name: Security Vulnerability Scan
      run: |
        echo "=== Checking for known vulnerabilities ==="
        dotnet list package --vulnerabilities --include-transitive 2>&1 | tee vulnerabilities.txt
        if grep -q "Critical\|High" vulnerabilities.txt; then
          echo "::error::Critical or High severity vulnerabilities found!"
          exit 1
        fi
        echo "No critical vulnerabilities found."

  migration-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore --configuration Release

    - name: Check Pending Migrations
      run: |
        echo "=== Checking for pending EF Core migrations ==="
        dotnet ef migrations list --project src/PBMS.Infrastructure --no-build --configuration Release 2>&1 | tee migrations.txt
        echo "Migration check completed."

    - name: Verify Migration Files Exist
      run: |
        echo "=== Verifying migration files ==="
        MIGRATION_COUNT=$(find src/PBMS.Infrastructure/Migrations -name "*.cs" -not -name "*Designer.cs" 2>/dev/null | wc -l)
        echo "Found $MIGRATION_COUNT migration files"
        if [ "$MIGRATION_COUNT" -eq 0 ]; then
          echo "::warning::No migration files found. Ensure migrations are committed."
        fi

  swagger-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Solution
      run: dotnet build --no-restore --configuration Release

    - name: Start API Server
      run: |
        dotnet run --project src/PBMS.API --no-build --configuration Release --urls=http://localhost:5000 &
        echo "Waiting for API server to start..."
        sleep 15

    - name: Verify Swagger JSON
      run: |
        echo "=== Checking Swagger endpoint ==="
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/swagger/v1/swagger.json)
        if [ "$HTTP_STATUS" -eq 200 ]; then
          echo "Swagger endpoint is accessible (HTTP $HTTP_STATUS)"
          curl -s http://localhost:5000/swagger/v1/swagger.json | jq '.info.title, .info.version' || true
        else
          echo "::error::Swagger endpoint returned HTTP $HTTP_STATUS"
          exit 1
        fi

    - name: Verify API Endpoints
      run: |
        echo "=== Checking key API endpoints ==="
        ENDPOINTS=(
          "/api/monthly-subscriptions"
          "/api/subscription-price-configs"
          "/api/ParkingSlots"
          "/api/cards"
        )
        for endpoint in "${ENDPOINTS[@]}"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:5000$endpoint" -H "Authorization: Bearer test")
          echo "$endpoint -> HTTP $STATUS"
        done

    - name: Stop API Server
      if: always()
      run: |
        pkill -f "dotnet.*PBMS.API" || true
        echo "API server stopped."
